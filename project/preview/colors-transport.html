<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:#FFFAF3;font-family:var(--font-body);}
.wrap{padding:22px 26px;position:relative;}
/* hand-drawn dotted background */
.wrap::before{
  content:"";position:absolute;inset:0;
  background-image:radial-gradient(#F0D8C0 1px,transparent 1.2px);
  background-size:14px 14px;opacity:.45;pointer-events:none;
}
.label{font-size:11px;color:#A88575;font-weight:700;letter-spacing:.06em;margin-bottom:4px;text-transform:uppercase;font-family:'Nunito',sans-serif;position:relative;z-index:1;}
.title{font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;color:#5C3A28;margin-bottom:18px;letter-spacing:-.01em;position:relative;z-index:1;}
.title .sp{display:inline-block;animation:tw 1.6s ease-in-out infinite;}
@keyframes tw{0%,100%{transform:scale(1) rotate(0);opacity:1}50%{transform:scale(1.2) rotate(15deg);opacity:.6}}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;position:relative;z-index:1;}
.t{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  background:#FFFEF7;
  border:2px solid #5C3A28;
  border-radius:22px;
  padding:14px 8px 12px;
  position:relative;
  box-shadow:3px 3px 0 #5C3A28;
}
.dot{
  width:60px;height:60px;border-radius:50%;
  border:2px solid #5C3A28;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  box-shadow:2px 2px 0 #5C3A28;
}
.bear{
  position:absolute;font-size:30px;line-height:1;
  filter:drop-shadow(1px 1px 0 rgba(92,58,40,.15));
}
.spark{
  position:absolute;font-size:11px;color:#E89A3F;
}
.s1{top:-6px;right:-4px;}
.s2{bottom:-2px;left:-6px;}
.n{
  font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;color:#5C3A28;
  display:flex;align-items:center;gap:4px;
}
.n::before,.n::after{content:"·";color:#E89A3F;font-weight:900;}
.h{font-family:var(--font-mono);font-size:9px;color:#A88575;letter-spacing:.04em;}
/* connecting dashed route at the bottom */
.route{
  margin-top:18px;height:14px;
  background-image:radial-gradient(#5C3A28 1.5px,transparent 1.8px);
  background-size:8px 14px;background-repeat:repeat-x;background-position:center;
  position:relative;z-index:1;
}
.route::before,.route::after{
  content:"";position:absolute;top:50%;width:8px;height:8px;border-radius:50%;
  background:#FF6FA3;border:1.5px solid #5C3A28;transform:translateY(-50%);
}
.route::before{left:8%}.route::after{right:8%}
</style></head>
<body><div class="wrap">
  <div class="label">transport</div>
  <div class="title">熊熊怎麼移動呢 <span class="sp">✨</span></div>
  <div class="row">
    <div class="t">
      <div class="dot" style="background:#C8F5E9">
        <span class="bear">🚶‍♀️</span>
        <span class="spark s1">✦</span>
      </div>
      <div class="n">步行</div>
      <div class="h">walk</div>
    </div>
    <div class="t">
      <div class="dot" style="background:#C9D2FF">
        <span class="bear">🚌</span>
        <span class="spark s2">✦</span>
      </div>
      <div class="n">公車</div>
      <div class="h">bus</div>
    </div>
    <div class="t">
      <div class="dot" style="background:#DDD3FF">
        <span class="bear">🚇</span>
        <span class="spark s1">✧</span>
      </div>
      <div class="n">地鐵</div>
      <div class="h">subway</div>
    </div>
    <div class="t">
      <div class="dot" style="background:#FFF6B5">
        <span class="bear">🚕</span>
        <span class="spark s2">✦</span>
      </div>
      <div class="n">小黃</div>
      <div class="h">taxi</div>
    </div>
    <div class="t">
      <div class="dot" style="background:#FFD4B8">
        <span class="bear">🚙</span>
        <span class="spark s1">✧</span>
      </div>
      <div class="n">UBER</div>
      <div class="h">uber</div>
    </div>
  </div>
  <div class="route"></div>
</div></body></html>
