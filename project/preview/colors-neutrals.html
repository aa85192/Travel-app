<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.sw{aspect-ratio:1.5;border-radius:18px;border:1px solid rgba(0,0,0,.04);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;}
.sw .n{font-size:11px;font-weight:700;}
.sw .h{font-family:var(--font-mono);font-size:9px;opacity:.6;}
.dark{color:#fff;}
.note{font-size:10px;color:var(--fg-3);margin-top:8px;}
</style></head>
<body><div class="wrap">
  <div class="label">neutrals · warm-tinted, no pure gray</div>
  <div class="row">
    <div class="sw" style="background:#FFFAFC;border-color:#F0E0E5"><span class="n">white</span><span class="h">FFFAFC</span></div>
    <div class="sw" style="background:#F5EDEF"><span class="n">gray-1</span><span class="h">F5EDEF</span></div>
    <div class="sw" style="background:#E0D0D5"><span class="n">gray-2</span><span class="h">E0D0D5</span></div>
    <div class="sw" style="background:#ADA0A5;color:#fff"><span class="n">gray-3</span><span class="h">ADA0A5</span></div>
    <div class="sw dark" style="background:#2D2030"><span class="n">dark</span><span class="h">2D2030</span></div>
  </div>
  <div class="note">Warm pink-undertone neutrals replace stock gray throughout the system.</div>
</div></body></html>
