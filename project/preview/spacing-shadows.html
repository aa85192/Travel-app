<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:24px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;margin-bottom:16px;text-transform:uppercase;}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.card{background:#fff;border:1px solid var(--border-card);border-radius:24px;padding:18px;display:flex;flex-direction:column;gap:6px;}
.n{font-size:13px;font-weight:700;color:var(--fg-1);}
.h{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
.sm{box-shadow:0 2px 8px rgba(255,111,163,.06);}
.md{box-shadow:0 2px 20px rgba(0,0,0,.06);}
.glow{box-shadow:0 0 20px rgba(255,172,187,.30);}
</style></head>
<body><div class="wrap">
  <div class="label">elevation · soft, pink-tinted, low-z</div>
  <div class="row">
    <div class="card sm"><span class="n">shadow-sm</span><span class="h">0 2px 8px pink/6%</span><span class="h">utility chips</span></div>
    <div class="card md"><span class="n">shadow-md</span><span class="h">0 2px 20px black/6%</span><span class="h">cards (Apple Wallet)</span></div>
    <div class="card glow"><span class="n">shadow-glow</span><span class="h">0 0 20px pink/30%</span><span class="h">CTAs, hero photos</span></div>
  </div>
</div></body></html>
