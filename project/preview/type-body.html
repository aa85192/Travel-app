<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);color:var(--fg-1);}
.wrap{padding:20px 24px;}
.row{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border-soft);padding:8px 0;}
.row:last-child{border:none;}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
.body-lg{font-size:16px;font-weight:500;color:#5A4452;}
.body{font-size:14px;font-weight:500;color:#5A4452;}
.label{font-size:11px;font-weight:700;color:var(--color-milk-tea-500);letter-spacing:.04em;}
.hint{font-size:10px;color:var(--fg-3);font-weight:500;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="body-lg">建議穿韓服免費入場！</span><span class="meta">Noto TC 500 · 16</span></div>
  <div class="row"><span class="body">澡堂風格咖啡廳，蒙布朗很有名</span><span class="meta">Noto TC 500 · 14</span></div>
  <div class="row"><span class="label">航班資訊</span><span class="meta">Noto TC 700 · 11/.04em</span></div>
  <div class="row"><span class="hint">收藏商家 IG / 小紅書 連結</span><span class="meta">Noto TC 500 · 10</span></div>
</div></body></html>
