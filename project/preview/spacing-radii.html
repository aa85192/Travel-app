<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;margin-bottom:12px;text-transform:uppercase;}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.box{aspect-ratio:1;background:#fff;border:1px solid var(--border-card);box-shadow:0 2px 8px rgba(255,111,163,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.n{font-size:11px;font-weight:700;color:var(--fg-1);}
.h{font-family:var(--font-mono);font-size:9px;color:var(--fg-3);}
</style></head>
<body><div class="wrap">
  <div class="label">corner radii · pebble-smooth, generous</div>
  <div class="row">
    <div class="box" style="border-radius:6px"><span class="n">xs</span><span class="h">6</span></div>
    <div class="box" style="border-radius:10px"><span class="n">sm</span><span class="h">10</span></div>
    <div class="box" style="border-radius:14px"><span class="n">md</span><span class="h">14</span></div>
    <div class="box" style="border-radius:18px"><span class="n">lg</span><span class="h">18</span></div>
    <div class="box" style="border-radius:24px"><span class="n">xl</span><span class="h">24</span></div>
    <div class="box" style="border-radius:32px"><span class="n">3xl</span><span class="h">32</span></div>
    <div class="box" style="border-radius:9999px"><span class="n">pill</span><span class="h">∞</span></div>
  </div>
</div></body></html>
