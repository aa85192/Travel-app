<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px;}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px;background:#fff;border-radius:18px;padding:14px 6px;border:1px solid var(--color-milk-tea-100);}
.cell img{width:54px;height:54px;mix-blend-mode:multiply;}
.n{font-size:11px;font-weight:700;color:var(--fg-1);}
.h{font-family:var(--font-mono);font-size:9px;color:var(--fg-3);}
</style></head>
<body><div class="wrap">
  <div class="label">brand · bear nav icons (PNG, multiply blend)</div>
  <div class="row">
    <div class="cell"><img src="../assets/bear-icons/home.png"><span class="n">首頁</span><span class="h">home</span></div>
    <div class="cell"><img src="../assets/bear-icons/itinerary.png"><span class="n">行程</span><span class="h">itinerary</span></div>
    <div class="cell"><img src="../assets/bear-icons/LIST.png"><span class="n">待辦</span><span class="h">LIST</span></div>
    <div class="cell"><img src="../assets/bear-icons/MAP.png"><span class="n">地圖</span><span class="h">MAP</span></div>
    <div class="cell"><img src="../assets/bear-icons/COST.png"><span class="n">預算</span><span class="h">COST</span></div>
    <div class="cell"><img src="../assets/bear-icons/SETTING.png"><span class="n">設定</span><span class="h">SETTING</span></div>
  </div>
</div></body></html>
