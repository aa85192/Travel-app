<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;margin-bottom:12px;text-transform:uppercase;}
.row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.s{display:flex;flex-direction:column;align-items:center;gap:6px;}
.bar{background:var(--color-milk-tea-300);height:24px;border-radius:6px;}
.n{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
</style></head>
<body><div class="wrap">
  <div class="label">spacing · 4px grid</div>
  <div class="row">
    <div class="s"><div class="bar" style="width:4px"></div><span class="n">4</span></div>
    <div class="s"><div class="bar" style="width:8px"></div><span class="n">8</span></div>
    <div class="s"><div class="bar" style="width:12px"></div><span class="n">12</span></div>
    <div class="s"><div class="bar" style="width:16px"></div><span class="n">16</span></div>
    <div class="s"><div class="bar" style="width:20px"></div><span class="n">20</span></div>
    <div class="s"><div class="bar" style="width:24px"></div><span class="n">24</span></div>
    <div class="s"><div class="bar" style="width:32px"></div><span class="n">32</span></div>
    <div class="s"><div class="bar" style="width:40px"></div><span class="n">40</span></div>
  </div>
</div></body></html>
