<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);color:var(--fg-1);}
.wrap{padding:20px 24px;}
.row{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border-soft);padding:8px 0;}
.row:last-child{border:none;}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
.h1{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:-.01em;}
.h2{font-family:var(--font-display);font-weight:800;font-size:20px;}
.h3{font-family:var(--font-display);font-weight:700;font-size:18px;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="h1">🎀 Cindy's Paradise ☁️</span><span class="meta">Nunito 800 · 24/-1%</span></div>
  <div class="row"><span class="h2">首爾五天四夜 ☕</span><span class="meta">Nunito 800 · 20</span></div>
  <div class="row"><span class="h3">古宮巡禮 🏯</span><span class="meta">Nunito 700 · 18</span></div>
</div></body></html>
