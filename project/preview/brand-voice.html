<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px;}
.line{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border-soft);}
.line:last-child{border:none;}
.line .q{font-size:14px;color:var(--fg-1);font-weight:500;flex:1;}
.line .tag{font-size:9px;font-family:var(--font-mono);color:var(--fg-3);background:var(--color-milk-tea-50);padding:3px 7px;border-radius:9999px;}
</style></head>
<body><div class="wrap">
  <div class="label">voice · 25-y/o ENFJ diary · TC + emoji</div>
  <div class="line"><span class="q">「建議穿韓服免費入場！光化門守衛交接 10:00/14:00」</span><span class="tag">spot note</span></div>
  <div class="line"><span class="q">「澡堂風格咖啡廳，蒙布朗很有名！」</span><span class="tag">spot note</span></div>
  <div class="line"><span class="q">🎀✨Cindy's Paradise☁️💖</span><span class="tag">app title</span></div>
  <div class="line"><span class="q">首爾五天四夜 ☕ · 古宮巡禮 🏯 · 弘大 &amp; 明洞 🛍️</span><span class="tag">trip / day</span></div>
  <div class="line"><span class="q">我就爛 · 吃土 · 殘破不堪 · 花錢買快樂</span><span class="tag">sticker beats</span></div>
</div></body></html>
