<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);color:var(--fg-1);}
.wrap{padding:20px 24px;}
.row{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--border-soft);padding:10px 0;}
.row:last-child{border:none;}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
.mono{font-family:var(--font-mono);font-variant-numeric:tabular-nums;}
.time{font-size:30px;font-weight:600;color:var(--fg-1);}
.code{font-size:18px;font-weight:700;}
.price{font-size:14px;font-weight:500;color:var(--color-milk-tea-700);}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="mono time">14:15</span><span class="meta">DM Mono 600 · 30 (flight time)</span></div>
  <div class="row"><span class="mono code">KHH → PUS</span><span class="meta">DM Mono 700 · 18 (airport)</span></div>
  <div class="row"><span class="mono price">KRW 75,000</span><span class="meta">DM Mono 500 · 14 (price)</span></div>
</div></body></html>
