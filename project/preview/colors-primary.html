<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;}
.row{display:grid;grid-template-columns:repeat(10,1fr);gap:6px;}
.sw{aspect-ratio:1;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box;border:1px solid rgba(0,0,0,.04);}
.sw .n{font-family:var(--font-mono);font-size:10px;font-weight:600;}
.sw .h{font-family:var(--font-mono);font-size:8px;opacity:.7;}
.dark{color:#fff;}
</style></head>
<body><div class="wrap">
  <div class="label">milk-tea · primary scale</div>
  <div class="row">
    <div class="sw" style="background:#FFF8FA"><span class="n">50</span><span class="h">FFF8FA</span></div>
    <div class="sw" style="background:#FED7DD"><span class="n">100</span><span class="h">FED7DD</span></div>
    <div class="sw" style="background:#FFBFCA"><span class="n">200</span><span class="h">FFBFCA</span></div>
    <div class="sw" style="background:#FFACBB"><span class="n">300</span><span class="h">FFACBB</span></div>
    <div class="sw" style="background:#FF8FAF"><span class="n">400</span><span class="h">FF8FAF</span></div>
    <div class="sw dark" style="background:#FF6FA3"><span class="n">500</span><span class="h">FF6FA3</span></div>
    <div class="sw dark" style="background:#E8538C"><span class="n">600</span><span class="h">E8538C</span></div>
    <div class="sw dark" style="background:#C23E73"><span class="n">700</span><span class="h">C23E73</span></div>
    <div class="sw dark" style="background:#9C2B58"><span class="n">800</span><span class="h">9C2B58</span></div>
    <div class="sw dark" style="background:#6B1A3C"><span class="n">900</span><span class="h">6B1A3C</span></div>
  </div>
</div></body></html>
