<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;}
.s{aspect-ratio:1;background:#fff;border-radius:14px;border:1px solid var(--color-milk-tea-100);display:flex;align-items:center;justify-content:center;padding:4px;}
.s img{width:100%;height:100%;object-fit:contain;}
.note{font-size:10px;color:var(--fg-3);margin-top:10px;}
</style></head>
<body><div class="wrap">
  <div class="label">brand · LINE sticker set (18 of 80)</div>
  <div class="grid">
    <div class="s"><img src="../assets/stickers/bear-wave.png"></div>
    <div class="s"><img src="../assets/stickers/bear-smile.png"></div>
    <div class="s"><img src="../assets/stickers/bear-cheer.png"></div>
    <div class="s"><img src="../assets/stickers/bear-sleepy.png"></div>
    <div class="s"><img src="../assets/stickers/bear-tongue.png"></div>
    <div class="s"><img src="../assets/stickers/bear-quiet.png"></div>
    <div class="s"><img src="../assets/stickers/bear-default.png"></div>
    <div class="s"><img src="../assets/stickers/bear-sit.png"></div>
    <div class="s"><img src="../assets/stickers/bear-puddle.png"></div>
    <div class="s"><img src="../assets/stickers/bear-receipt.png"></div>
    <div class="s"><img src="../assets/stickers/bear-sparkle.png"></div>
    <div class="s"><img src="../assets/stickers/bear-cry.png"></div>
    <div class="s"><img src="../assets/stickers/bear-laptop.png"></div>
    <div class="s"><img src="../assets/stickers/bear-sleep.png"></div>
    <div class="s"><img src="../assets/stickers/bear-money.png"></div>
    <div class="s"><img src="../assets/stickers/bear-tired.png"></div>
    <div class="s"><img src="../assets/stickers/bear-eat-dirt.png"></div>
    <div class="s"><img src="../assets/stickers/bear-exit.png"></div>
  </div>
  <div class="note">Use as empty-state heroes / celebration moments. Never as functional icons.</div>
</div></body></html>
