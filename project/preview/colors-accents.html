<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
.wrap{padding:18px 22px;}
.label{font-size:11px;color:var(--fg-3);font-weight:700;letter-spacing:.04em;margin-bottom:10px;text-transform:uppercase;}
.row{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;}
.sw{aspect-ratio:1;border-radius:18px;border:1px solid rgba(0,0,0,.04);display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box;}
.sw .n{font-family:var(--font-body);font-size:11px;font-weight:700;color:#5A4452;}
.sw .h{font-family:var(--font-mono);font-size:8px;color:#5A4452;opacity:.6;}
</style></head>
<body><div class="wrap">
  <div class="label">macaron accent palette · category colors</div>
  <div class="row">
    <div class="sw" style="background:#FFD4B8"><span class="n">coral</span><span class="h">FFD4B8</span></div>
    <div class="sw" style="background:#AAB6FB"><span class="n">pink</span><span class="h">AAB6FB</span></div>
    <div class="sw" style="background:#FFFEE1"><span class="n">cream</span><span class="h">FFFEE1</span></div>
    <div class="sw" style="background:#99F2E6"><span class="n">sage</span><span class="h">99F2E6</span></div>
    <div class="sw" style="background:#B8DCFF"><span class="n">sky</span><span class="h">B8DCFF</span></div>
    <div class="sw" style="background:#FFE4A0"><span class="n">warning</span><span class="h">FFE4A0</span></div>
    <div class="sw" style="background:#FFB3BA"><span class="n">error</span><span class="h">FFB3BA</span></div>
    <div class="sw" style="background:#C5B8FF"><span class="n">lilac</span><span class="h">C5B8FF</span></div>
  </div>
</div></body></html>
