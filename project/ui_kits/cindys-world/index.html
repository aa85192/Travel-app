<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>Cindy's World — UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #F2E5E9; font-family: "Noto Sans TC", "Nunito", sans-serif; }
    #stage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 30px; }
    .phone {
      width: 390px; height: 844px;
      background: #2D2030; border-radius: 50px; padding: 11px;
      box-shadow: 0 30px 80px rgba(155, 80, 110, 0.35), inset 0 0 0 1px rgba(255,255,255,0.06);
      position: relative;
    }
    .phone .notch {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 30px; background: #1a0e16; border-radius: 9999px; z-index: 100; pointer-events: none;
    }
    .screen {
      width: 100%; height: 100%; border-radius: 40px; overflow: hidden; background: #FFF8FA; position: relative;
    }
    button { font-family: inherit; }
    *::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div id="stage">
    <div class="phone">
      <div class="notch"></div>
      <div class="screen" id="root"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel" src="Home.jsx"></script>
  <script type="text/babel" src="Itinerary.jsx"></script>
  <script type="text/babel" src="Map.jsx"></script>
  <script type="text/babel" src="Budget.jsx"></script>
  <script type="text/babel" src="Settings.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
